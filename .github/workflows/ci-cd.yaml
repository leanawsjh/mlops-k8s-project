name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔐 Configure AWS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🐳 Login to ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    # 🏗️ Build image
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.ECR_REPOSITORY }} -f docker/Dockerfile .

    # 🏷️ Tag image
    - name: Tag image
      run: |
        docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    # 📤 Push to ECR
    - name: Push image to ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    # ☸️ Update kubeconfig
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}

    # 🚀 Deploy to Kubernetes
    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/deployment-v1.yaml
        kubectl apply -f k8s/service.yaml
